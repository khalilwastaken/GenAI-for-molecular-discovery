# @package _global_
model:
  extra_features: 'all'
  context_size: 12       # 12 méta-catégories d'odeur

  input_dims:
    X: 12
    E: 5
    y: 13
  hidden_mlp_dims:
    X: 256
    E: 32
    y: 128
  hidden_dims:
    dx: 128
    de: 32
    dy: 128
    n_head: 8
    dim_ffX: 512
    dim_ffE: 128
  output_dims:
    X: 12
    E: 5
    y: 13

defaults:
  - override /dataset: odor
  - _self_

general:
  name: odor
  wandb: offline

dataset:
  datadir: data/odor

train:
  n_epochs: 50
  batch_size: 64
